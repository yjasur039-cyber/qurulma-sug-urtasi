<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI.V | Security Suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --p-bg: #ffffff; --a-blue: #1a73e8; --t-dark: #202124; --i-bg: #f1f3f4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--p-bg); overflow: hidden; }

        /* Gorizontal ekranlar ssenariysi */
        .viewport { display: flex; width: 300vw; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen { width: 100vw; height: 100%; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; text-align: center; }

        /* SIZNING LOGOTIPINGIZ (Aynan rasmdagidek) */
        .header-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .custom-icon { width: 35px; height: 35px; stroke: #000; stroke-width: 4; fill: none; }
        .title-box { border: 1.5px solid #000; padding: 5px 20px; border-radius: 8px; font-weight: bold; font-size: 18px; }

        /* Inputlar va Tugma */
        input { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--i-bg); font-size: 16px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: auto; }

        /* Shaxsiy ma'lumotlar paneli */
        .user-header { display: flex; justify-content: space-between; align-items: center; background: var(--i-bg); padding: 15px; border-radius: 15px; margin-bottom: 25px; }
        .p-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--a-blue); }
    </style>
</head>
<body>

<div class="viewport" id="stage">
    
    <div class="screen">
        <div class="header-area">
            <svg class="custom-icon" viewBox="0 0 100 100">
                <rect x="25" y="25" width="50" height="50" transform="rotate(45 50 50)"/>
                <rect x="25" y="25" width="50" height="50"/>
            </svg>
            <div class="title-box">havfsizlik 2.0</div>
        </div>
        <input type="text" id="fn" placeholder="Ism">
        <input type="text" id="fs" placeholder="Familiya">
        <input type="tel" value="+998">
        <input type="email" placeholder="Gmail">
        <button class="btn-black" onclick="move(1)">keyingisi</button>
    </div>

    <div class="screen">
        <div class="user-header">
            <div style="text-align: left;">
                <span style="font-size: 11px;">Foydalanuvchi:</span><br>
                <b id="nm" style="border: 1px solid #000; padding: 0 10px;">...</b>
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="p-img">
        </div>
        
        <p style="text-align: left; font-size: 13px;">android sistemasi: <br><b style="color:var(--a-blue);">Android 14 | Security Update</b></p>

        <div style="margin: auto;">
            <svg style="width:150px; height:150px; cursor:pointer;" viewBox="0 0 100 100" onclick="finish()">
                <rect x="20" y="20" width="60" height="60" stroke="black" stroke-width="4" fill="none" transform="rotate(45 50 50)"/>
                <rect x="20" y="20" width="60" height="60" stroke="black" stroke-width="4" fill="none"/>
            </svg>
            <p style="color:var(--a-blue); font-weight:bold; margin-top:20px;">TASDIQLASH UCHUN BOSING</p>
        </div>
    </div>

    <div class="screen" style="background: #f8fff9;">
        <div style="margin: auto;">
            <div style="color: #34a853; font-size: 50px;">✅</div>
            <h2 style="color: #34a853;">100% HIMOAYALANDI</h2>
            <p>Hujjat tayyorlandi.</p>
            <button class="btn-black" onclick="download()" style="background:#34a853; width:200px;">PDF YUKLASH</button>
        </div>
    </div>

</div>

<script>
    let data = { name: '', sname: '' };

    function move(idx) {
        data.name = document.getElementById('fn').value;
        data.sname = document.getElementById('fs').value;
        document.getElementById('nm').innerText = data.name;
        document.getElementById('stage').style.transform = `translateX(-${idx * 100}vw)`;
    }

    function finish() {
        move(2);
    }

    function download() {
        const doc = document.createElement('div');
        // PDF ichida yulduz yo'q, faqat rasmiy matn
        doc.innerHTML = `
            <div style="padding:40px; border:10px solid #1a73e8; text-align:center;">
                <h1>ANTI.V SECURITY</h1>
                <hr>
                <p>Foydalanuvchi: <b>${data.name} ${data.sname}</b></p>
                <p>Xolati: <b>To'liq himoyalangan</b></p>
                <p>Sana: ${new Date().toLocaleDateString()}</p>
                <br><br>
                <div style="border:1px solid #000; display:inline-block; padding:10px;">TASDIQLANGAN</div>
            </div>
        `;
        html2pdf().from(doc).save('security_report.pdf');
    }
</script>

</body>
</html>
