<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havfsizlik 2.0 | Official</title>
    <style>
        :root {
            --primary-bg: #ffffff;
            --accent-blue: #1a73e8;
            --text-dark: #202124;
            --input-bg: #f1f3f4;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background: var(--primary-bg);
            color: var(--text-dark);
            overflow: hidden;
        }

        .container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100%;
            max-width: 500px; margin: 0 auto;
            padding: 20px; box-sizing: border-box;
        }

        /* Yuqori qism dizayni */
        .header {
            text-align: center; margin-top: 20px; margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 22px; font-weight: 500; border: 1.5px solid #000;
            display: inline-block; padding: 5px 25px; border-radius: 8px;
            text-transform: lowercase;
        }

        /* Inputlar uslubi */
        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 16px 20px; border-radius: 12px;
            border: none; background: var(--input-bg);
            font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { background: #e8f0fe; box-shadow: inset 0 0 0 2px var(--accent-blue); outline: none; }

        /* Tugma dizayni */
        .btn-main {
            background: #000; color: #fff; border: none;
            padding: 18px; border-radius: 15px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: auto;
            transition: 0.3s active;
        }
        .btn-main:active { transform: scale(0.98); }

        /* OTP Katakchalari */
        .otp-wrapper { display: flex; justify-content: space-between; gap: 10px; margin: 40px 0; }
        .otp-box {
            width: 55px; height: 65px; border: 2px solid #dadce0;
            border-radius: 12px; text-align: center; font-size: 24px;
            font-weight: bold; background: transparent;
        }

        /* Dashboard va Emblema */
        .profile-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--input-bg); padding: 15px; border-radius: 20px;
        }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; background: #ddd; border: 2px solid var(--accent-blue); }

        .emblem-zone {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* Sakkiz qirrali yulduz animatsiyasi */
        .star-emblem {
            width: 180px; height: 180px; fill: var(--accent-blue);
            filter: drop-shadow(0 0 15px rgba(26,115,232,0.4));
            animation: pulse 3s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(26,115,232,0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(26,115,232,0.7)); }
        }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="step1" class="fade-in" style="height: 100%; display: flex; flex-direction: column;">
        <div class="header"><h1>havfsizlik 2.0</h1></div>
        <input type="text" id="name" placeholder="isim:">
        <input type="text" id="surname" placeholder="familiya:">
        <input type="tel" id="phone" value="+998">
        <input type="email" id="email" placeholder="gmail:">
        <button class="btn-main" onclick="nextStep(2)">keyingisi</button>
    </div>

    <div id="step2" class="hidden fade-in" style="height: 100%; display: flex; flex-direction: column;">
        <div class="header"><h1>havfsizlik 2.0</h1></div>
        <p style="text-align: center; color: #5f6368;">iltimos kelgan code ni kiriting:</p>
        <div class="otp-wrapper">
            <input type="text" class="otp-box" maxlength="1" oninput="moveNext(this)">
            <input type="text" class="otp-box" maxlength="1" oninput="moveNext(this)">
            <input type="text" class="otp-box" maxlength="1" oninput="moveNext(this)">
            <input type="text" class="otp-box" maxlength="1" oninput="moveNext(this)">
            <input type="text" class="otp-box" maxlength="1" oninput="moveNext(this)">
        </div>
        <button class="btn-main" onclick="nextStep(3)">tizimga kirish</button>
    </div>

    <div id="step3" class="hidden fade-in" style="height: 100%; display: flex; flex-direction: column;">
        <div class="profile-bar">
            <div>
                <span style="font-size: 12px; color: #555;">Foydalanuvchi:</span><br>
                <b id="userDisp" style="border: 1px solid #000; padding: 2px 10px; border-radius: 4px;">...</b>
            </div>
            <div class="profile-img">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="100%">
            </div>
        </div>

        <div style="margin-top: 20px; font-size: 14px;">
            android sistemasi: <br>
            <b style="color: var(--accent-blue);">Android 14 | Security Patch 2026</b>
        </div>

        <div class="emblem-zone">
            <svg class="star-emblem" viewBox="0 0 100 100" onclick="completeSecure()">
                <path d="M50 0 L60 35 L95 35 L67 55 L77 90 L50 70 L23 90 L33 55 L5 35 L40 35 Z" />
            </svg>
            <p id="statusTxt" style="margin-top: 20px; font-weight: bold; letter-spacing: 1px;">QURILMA TEKSHIRILMOQDA...</p>
        </div>
    </div>
</div>

<script>
    let uData = {};

    function nextStep(step) {
        if(step === 2) {
            uData.name = document.getElementById('name').value;
            if(!uData.name) return alert("Ismingizni kiriting!");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        } else if(step === 3) {
            document.getElementById('userDisp').innerText = uData.name;
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        }
    }

    function moveNext(el) {
        if(el.value && el.nextElementSibling) el.nextElementSibling.focus();
    }

    function completeSecure() {
        const txt = document.getElementById('statusTxt');
        const star = document.querySelector('.star-emblem');
        
        txt.innerText = "TIZIM 100% HIMOAYALANDI ✅";
        txt.style.color = "#34a853";
        star.style.fill = "#34a853";
        star.style.animation = "none";
        star.style.transform = "scale(1.2)";
        
        // Bu yerda botga yakuniy xabar yuborish mumkin
    }
</script>

</body>
</html>
