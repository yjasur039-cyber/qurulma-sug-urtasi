<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havfsizlik 2.0 | Official</title>
    <style>
        :root { --p-bg: #ffffff; --a-blue: #1a73e8; --t-dark: #202124; --i-bg: #f1f3f4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Google Sans', sans-serif; background: var(--p-bg); color: var(--t-dark); overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; text-align: center; }
        
        /* Input & Button Styles */
        input { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--i-bg); font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: auto; }

        /* Silliqlangan Sakkiz Qirrali Emblema (Siz yuborgandek) */
        .emblem-core {
            width: 150px; height: 150px; cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 10px rgba(26,115,232,0.2));
            margin: auto;
        }
        .emblem-core:hover { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(26,115,232,0.5)); }
        
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="fade-in" style="height:100%; display:flex; flex-direction:column;">
        <h1 style="border: 1.5px solid #000; display:inline-block; padding:5px 20px; border-radius:8px; margin: 20px auto 40px auto; font-size:22px;">havfsizlik 2.0</h1>
        <input type="text" placeholder="Ism-Familiya">
        <input type="tel" value="+998">
        <button class="btn-black" onclick="showStep(2)">keyingisi</button>
    </div>

    <div id="step2" class="hidden fade-in" style="height:100%; display:flex; flex-direction:column;">
        <p style="font-size:12px; color:#555; text-align:left;">android sistemasi: <br><b style="color:var(--a-blue);">Active Security Shield</b></p>
        
        <div style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
            <svg class="emblem-core" viewBox="0 0 100 100" onclick="showStep(3)">
                <rect x="15" y="15" width="70" height="70" rx="2" stroke="var(--a-blue)" stroke-width="4" fill="none" transform="rotate(45 50 50)"/>
                <rect x="15" y="15" width="70" height="70" rx="2" stroke="var(--a-blue)" stroke-width="4" fill="none"/>
                <circle cx="50" cy="50" r="5" fill="var(--a-blue)"/>
            </svg>
        </div>
        
        <p style="font-weight:bold; color:var(--a-blue); animation:pulse 2s infinite;">TEKSHIRISH UCHUN EMBLEMANI BOSING</p>
    </div>

    <div id="step3" class="hidden fade-in" style="height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <svg class="emblem-core" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 20px #34a853);">
            <rect x="15" y="15" width="70" height="70" rx="2" stroke="#34a853" stroke-width="4" fill="#34a853" opacity="0.1" transform="rotate(45 50 50)"/>
            <rect x="15" y="15" width="70" height="70" rx="2" stroke="#34a853" stroke-width="4" fill="#34a853" opacity="0.1"/>
            <path d="M35 50 L45 60 L65 40" stroke="#34a853" stroke-width="6" fill="none" stroke-linecap="round"/>
        </svg>
        
        <h1 style="color:#34a853; margin-top:30px;">100% HIMOAYALANDI</h1>
        <p style="color:#555;">Qurilmangiz to'liq auditdan o'tdi.</p>
        <button class="btn-black" onclick="location.reload()" style="margin-top:40px; width:100%;">Tugallash</button>
    </div>
</div>

<script>
    function showStep(step) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('step' + step).classList.remove('hidden');
        
        if(step === 2) {
            // Bu yerda botga ma'lumot yuborish kodi bo'lishi mumkin
        }
    }
</script>

<style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>

</body>
</html>
