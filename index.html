<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI.V | System Core</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --main-bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--main-bg);
            color: white; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Shaffof va zamonaviy konteyner */
        .app-container {
            width: 100%; max-width: 400px; height: 100vh;
            background: radial-gradient(circle at top right, #1a1b25, #0a0b10);
            display: flex; flex-direction: column; padding: 30px; box-sizing: border-box;
        }

        .header-box {
            text-align: center; border: 1px solid var(--neon-green);
            padding: 10px; border-radius: 5px; font-weight: 800;
            letter-spacing: 2px; color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,136,0.2);
        }

        /* Inputlar dizayni */
        .input-stack { margin-top: 40px; }
        input {
            width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-green); background: rgba(0,255,136,0.05); }

        /* Asosiy tugma */
        .btn-glow {
            background: var(--neon-green); color: #000; border: none;
            padding: 18px; border-radius: 15px; font-weight: bold;
            font-size: 16px; cursor: pointer; margin-top: auto;
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
        }

        /* Emblema (Siz xohlagandek sakkiz qirrali) */
        .star-container {
            margin: auto; position: relative; display: flex;
            justify-content: center; align-items: center;
        }

        .star-svg {
            width: 200px; filter: drop-shadow(0 0 20px var(--neon-green));
            animation: rotateStar 10s linear infinite;
        }

        @keyframes rotateStar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-text {
            margin-top: 20px; text-align: center; font-size: 14px;
            letter-spacing: 1px; color: #888;
        }

        .user-chip {
            background: var(--glass); padding: 10px 20px;
            border-radius: 30px; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="s1" style="height: 100%; display: flex; flex-direction: column;">
        <div class="header-box">HAVFSIZLIK 2.0</div>
        <div class="input-stack">
            <input type="text" id="i1" placeholder="Ism">
            <input type="text" id="i2" placeholder="Familiya">
            <input type="tel" value="+998">
            <input type="email" placeholder="Gmail">
        </div>
        <button class="btn-glow" onclick="go(2)">KEYINGISI</button>
    </div>

    <div id="s3" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
        <div class="user-chip">
            <span id="uName">Akmal</span>
            <div style="width: 35px; height: 35px; background: #333; border-radius: 50%; border: 2px solid var(--neon-green);"></div>
        </div>
        
        <div style="margin-top: 20px; font-size: 12px; color: #555;">
            ANDROID SISTEMASI: <br>
            <span style="color: #ccc;">KERNEL_X86_64 // SECURE_BOOT</span>
        </div>

        <div class="star-container">
            <svg class="star-svg" viewBox="0 0 100 100">
                <path d="M50 5 L58 38 L95 38 L65 58 L75 95 L50 75 L25 95 L35 58 L5 38 L42 38 Z" fill="none" stroke="var(--neon-green)" stroke-width="2" />
                <path d="M50 15 L55 42 L85 42 L60 58 L68 85 L50 70 L32 85 L40 58 L15 42 L45 42 Z" fill="var(--neon-green)" opacity="0.3" />
            </svg>
        </div>

        <div class="status-text" id="st">TIZIMNI AKTIVLASHTIRISH UCHUN BOSING</div>
        <button class="btn-glow" onclick="activate()">HIMOAYANI BOSHLASH</button>
    </div>
</div>

<script>
    function go(n) {
        document.getElementById('uName').innerText = document.getElementById('i1').value || "Akmal";
        document.getElementById('s1').classList.add('hidden');
        document.getElementById('s3').classList.remove('hidden');
    }

    function activate() {
        const s = document.querySelector('.star-svg');
        s.style.fill = "var(--neon-green)";
        s.style.filter = "drop-shadow(0 0 40px var(--neon-green))";
        document.getElementById('st').innerHTML = "TIZIM 100% HIMOAYALANDI ✅";
        document.getElementById('st').style.color = "var(--neon-green)";
    }
</script>

</body>
</html>
